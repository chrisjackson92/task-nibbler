# ============================================================================
# MANIFEST.yaml — Machine-Readable Document Registry
# ============================================================================
#
# PURPOSE: This is the agent's map. An AI agent given any task can read this
# single file, filter by tags/status/type/agents field, and locate exactly the
# docs it needs — no directory crawling required.
#
# USAGE (agent):
#   1. Parse this file
#   2. Filter documents by relevant tags, type, or agents field
#   3. Read only the docs that match your task
#
# USAGE (human with yq):
#   yq '.documents[] | select(.tags[] == "testing")' MANIFEST.yaml
#   yq '.documents[] | select(.status == "APPROVED")' MANIFEST.yaml
#   yq '.documents[] | select(.agents[] == "coder")' MANIFEST.yaml
#
# MAINTENANCE: Update this file whenever a doc is created, moved, or archived.
#   Run: CODEX/_scripts/manifest-gen.sh (when available) to auto-regenerate.
# ============================================================================

