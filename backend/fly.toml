app = "task-nibbles-api-staging"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  APP_ENV = "staging"
  LOG_LEVEL = "debug"
  AWS_REGION = "us-east-1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "5s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[deploy]
  release_command = "migrate"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
