name: task_nibbles
description: Task Nibbles — your gamified task manager
publish_to: 'none'
version: 1.3.0+3

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # HTTP client
  dio: ^5.4.3+1

  # Token storage (iOS Keychain / Android Keystore)
  flutter_secure_storage: ^9.2.2

  # Offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.2.7

  # Animations (Rive — placeholder until SPR-004-MB)
  rive: ^0.13.14

  # Offline detection
  connectivity_plus: ^6.0.5

  # Typography
  google_fonts: ^6.2.1
  intl: ^0.19.0

  # Media — SPR-003-MB attachments
  image_picker: ^1.1.2
  video_player: ^2.8.7
  permission_handler: ^11.3.1
  cached_network_image: ^3.3.1

  # Deep linking
  # uni_links removed (AUD-005-MB MB-002) — go_router handles tasknibbles:// natively

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # BLoC testing
  bloc_test: ^9.1.7

  # Mocking
  mocktail: ^1.0.4

  # Hive codegen (for type adapters if needed)
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

  # App icon generation (M-057, SPR-010-MB)
  flutter_launcher_icons: ^0.13.1

  # Native splash screen generation (M-057, SPR-010-MB)
  flutter_native_splash: ^2.4.0

# ── App icon config (run: dart run flutter_launcher_icons) ─────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21

# ── Native splash config (run: dart run flutter_native_splash:create) ──────────
flutter_native_splash:
  color: "#1B5E20"
  image: assets/icon/app_icon.png
  android_12:
    color: "#1B5E20"
    image: assets/icon/app_icon.png

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/icon/

  fonts: []
